---
name: Build - Windows

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  job:
    name: ${{ matrix.os }}-${{ matrix.go-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        go-version: [1.16.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build Login Server
        run: go build -o login-server ./src/
