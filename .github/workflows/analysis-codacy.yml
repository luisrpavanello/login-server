---
name: Analysis - Codacy Security Scan

on:
  workflow_call:
    secrets:
      CODACY_PROJECT_TOKEN:
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  codacy:
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Skip Codacy Analysis CLI
        if: ${{ env.CODACY_PROJECT_TOKEN == '' }}
        run: echo "CODACY_PROJECT_TOKEN is not available; skipping Codacy scan."

      - name: Run Codacy Analysis CLI
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08 # v4
        with:
          project-token: ${{ env.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      - name: Normalize SARIF for GitHub upload
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
        run: |
          python - <<'PY'
          import json

          with open("results.sarif", encoding="utf-8") as input_file:
              sarif = json.load(input_file)

          runs = sarif.get("runs", [])
          if runs:
              sarif["runs"] = [runs[0]]

          with open("results.github.sarif", "w", encoding="utf-8") as output_file:
              json.dump(sarif, output_file)
          PY

      - name: Upload SARIF results file
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: results.github.sarif
