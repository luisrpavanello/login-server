version: "3.3"

services:
  login-server:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - 8088:8088
      - 9090:9090
    environment:
      - LOGIN_IP=0.0.0.0
      - LOGIN_HTTP_PORT=8088
      - LOGIN_GRPC_PORT=9090
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DBNAME=canary
      - MYSQL_USER=canary
      - MYSQL_PASS=canary
      - SERVER_NAME=OTServBR-Global
      - SERVER_IP=127.0.0.1
      - SERVER_PORT=7172
      - SERVER_LOCATION=BRA
      - RATE_LIMITER_RATE=2
      - RATE_LIMITER_BURST=5
